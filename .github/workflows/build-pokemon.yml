name: Build Pokemon Files

on:
  workflow_dispatch:
  push:
    paths:
      - "runtime/pokemon-all.json"
      - "runtime/catch-rates.json"
      - "runtime/rarity-groups.json"
      - "tools/build-pokemon-files.js"
      - ".github/workflows/build-pokemon.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Run Pokemon build script
        run: node ./tools/build-pokemon-files.js

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add runtime/*.txt runtime/pokemon-summary.json
          git diff --staged --quiet || git commit -m "Build Pokemon runtime files"
          git push
